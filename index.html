<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ARCOS - AI Research & Content Operations</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06080d;
      --panel: rgba(14, 18, 29, .82);
      --panel-2: rgba(21, 27, 42, .78);
      --panel-3: rgba(255, 255, 255, .055);
      --line: rgba(255, 255, 255, .1);
      --line-2: rgba(255, 255, 255, .18);
      --text: #ecf3ff;
      --muted: #93a1b8;
      --quiet: #536078;
      --blue: #5aa7ff;
      --cyan: #2fe7ff;
      --green: #48f0a4;
      --amber: #ffd166;
      --red: #ff6f91;
      --violet: #a98bff;
      --magenta: #ff77d4;
      --shadow: 0 20px 70px rgba(0, 0, 0, .45);
      --radius: 8px;
      --left: 250px;
      --right: 360px;
      --bottom: 154px;
      --top: 58px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 20% 0%, rgba(47, 231, 255, .14), transparent 34%),
        radial-gradient(circle at 72% 12%, rgba(169, 139, 255, .18), transparent 30%),
        linear-gradient(135deg, #05060a, #0a0f18 45%, #090b10);
      color: var(--text);
      overflow: hidden;
      letter-spacing: 0;
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    a { color: var(--cyan); text-decoration: none; }
    ::selection { background: rgba(90, 167, 255, .35); }
    ::-webkit-scrollbar { width: 7px; height: 7px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.16); border-radius: 20px; }

    .app {
      display: grid;
      grid-template-columns: var(--left) minmax(0, 1fr) var(--right);
      grid-template-rows: var(--top) minmax(0, 1fr) var(--bottom);
      height: 100vh;
      position: relative;
    }

    .app:before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.85), transparent 78%);
    }

    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      background: rgba(7, 10, 16, .82);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(22px);
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 220px;
      font-weight: 800;
      letter-spacing: .08em;
      font-size: 13px;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--blue), var(--violet));
      box-shadow: 0 0 28px rgba(90, 167, 255, .35);
      font-weight: 900;
    }

    .command {
      flex: 1;
      max-width: 650px;
      position: relative;
    }

    .command input {
      width: 100%;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.055);
      color: var(--text);
      outline: none;
      padding: 0 14px 0 38px;
    }

    .command:before {
      content: "/";
      position: absolute;
      left: 13px;
      top: 8px;
      color: var(--quiet);
      font-weight: 800;
    }

    .top-meta {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      border: 1px solid rgba(72, 240, 164, .22);
      color: var(--green);
      border-radius: 999px;
      background: rgba(72, 240, 164, .08);
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 11px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 16px currentColor;
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .42; transform: scale(.75); }
    }

    .sidebar {
      grid-column: 1;
      grid-row: 2 / 4;
      padding: 14px 10px;
      overflow: auto;
      background: rgba(8, 12, 20, .78);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(22px);
      z-index: 10;
    }

    .nav-label {
      margin: 16px 10px 8px;
      color: var(--quiet);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 9px 10px;
      color: var(--muted);
      background: transparent;
      text-align: left;
      transition: .18s ease;
    }

    .nav-item:hover { color: var(--text); background: rgba(255,255,255,.055); }
    .nav-item.active {
      color: var(--text);
      border-color: rgba(90, 167, 255, .26);
      background: linear-gradient(90deg, rgba(90, 167, 255, .18), rgba(47, 231, 255, .055));
      box-shadow: inset 3px 0 0 var(--blue);
    }

    .nav-icon {
      width: 20px;
      display: inline-grid;
      place-items: center;
      color: var(--cyan);
      font-size: 14px;
    }

    .side-status {
      margin-top: 18px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.04);
      font-size: 12px;
      color: var(--muted);
    }

    .side-status strong {
      display: block;
      color: var(--text);
      margin-bottom: 7px;
    }

    .main {
      grid-column: 2;
      grid-row: 2;
      overflow: auto;
      padding: 18px;
      min-width: 0;
    }

    .right-panel {
      grid-column: 3;
      grid-row: 2;
      border-left: 1px solid var(--line);
      background: rgba(8, 12, 20, .7);
      backdrop-filter: blur(22px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 9;
    }

    .console {
      grid-column: 2 / -1;
      grid-row: 3;
      border-top: 1px solid var(--line);
      background: rgba(5, 8, 13, .9);
      backdrop-filter: blur(22px);
      display: grid;
      grid-template-rows: 36px 1fr;
      overflow: hidden;
      z-index: 12;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      font-weight: 800;
      font-size: 13px;
      letter-spacing: .02em;
    }

    .panel-body {
      padding: 12px;
      overflow: auto;
      min-height: 0;
    }

    .view { display: none; animation: rise .22s ease; }
    .view.active { display: block; }
    @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, .8fr);
      gap: 14px;
      margin-bottom: 14px;
    }

    .workspace-title {
      font-size: clamp(28px, 4vw, 54px);
      line-height: .98;
      margin: 0;
      letter-spacing: 0;
      max-width: 900px;
    }

    .workspace-title span {
      background: linear-gradient(120deg, #fff, var(--cyan) 44%, var(--violet));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtle { color: var(--muted); }
    .quiet { color: var(--quiet); }
    .mono { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.035));
      box-shadow: 0 10px 40px rgba(0,0,0,.14);
      overflow: hidden;
    }

    .card.pad { padding: 16px; }
    .card + .card { margin-top: 14px; }

    .grid { display: grid; gap: 14px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid.workspace { grid-template-columns: minmax(0, 1fr) 330px; }

    .metric {
      min-height: 105px;
      padding: 14px;
      position: relative;
    }

    .metric:after {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--blue), var(--cyan), transparent);
    }

    .metric-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .09em;
    }

    .metric-value {
      margin-top: 8px;
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
    }

    .metric-note {
      margin-top: 8px;
      color: var(--quiet);
      font-size: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 36px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 0 13px;
      transition: .18s ease;
      font-weight: 750;
    }

    .btn:hover { transform: translateY(-1px); border-color: var(--line-2); background: rgba(255,255,255,.095); }
    .btn.primary {
      border-color: rgba(90,167,255,.42);
      background: linear-gradient(135deg, rgba(90,167,255,.95), rgba(169,139,255,.82));
      box-shadow: 0 0 32px rgba(90,167,255,.2);
    }
    .btn.green { border-color: rgba(72,240,164,.28); background: rgba(72,240,164,.1); color: var(--green); }
    .btn.red { border-color: rgba(255,111,145,.28); background: rgba(255,111,145,.1); color: var(--red); }
    .btn.small { min-height: 29px; padding: 0 10px; font-size: 12px; }
    .btn.icon { width: 36px; padding: 0; }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .field { display: grid; gap: 7px; }
    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .input, .select, .textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.055);
      color: var(--text);
      outline: none;
      padding: 10px 11px;
      transition: .18s ease;
    }

    .textarea { min-height: 96px; resize: vertical; line-height: 1.55; }
    .input:focus, .select:focus, .textarea:focus {
      border-color: rgba(90,167,255,.64);
      box-shadow: 0 0 0 4px rgba(90,167,255,.12);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .segmented {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.035);
    }

    .segmented button {
      flex: 1;
      min-width: 124px;
      border: 0;
      border-radius: 7px;
      color: var(--muted);
      background: transparent;
      padding: 9px;
      font-weight: 800;
    }

    .segmented button.active {
      color: var(--text);
      background: rgba(90,167,255,.18);
      box-shadow: inset 0 0 0 1px rgba(90,167,255,.28);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 12px;
    }

    .section-head h2, .section-head h3 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 22px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      color: var(--muted);
      background: rgba(255,255,255,.04);
      white-space: nowrap;
    }

    .badge.blue { color: var(--blue); border-color: rgba(90,167,255,.25); background: rgba(90,167,255,.08); }
    .badge.green { color: var(--green); border-color: rgba(72,240,164,.25); background: rgba(72,240,164,.08); }
    .badge.amber { color: var(--amber); border-color: rgba(255,209,102,.25); background: rgba(255,209,102,.08); }
    .badge.red { color: var(--red); border-color: rgba(255,111,145,.25); background: rgba(255,111,145,.08); }
    .badge.violet { color: var(--violet); border-color: rgba(169,139,255,.25); background: rgba(169,139,255,.08); }

    .project-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .project-card {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.04);
      transition: .18s ease;
    }

    .project-card:hover { transform: translateY(-2px); border-color: rgba(90,167,255,.35); }

    .workflow {
      display: grid;
      gap: 10px;
    }

    .node {
      display: grid;
      grid-template-columns: 30px minmax(0,1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.035);
      position: relative;
      overflow: hidden;
    }

    .node.active {
      border-color: rgba(47,231,255,.55);
      box-shadow: 0 0 30px rgba(47,231,255,.12), inset 0 0 0 1px rgba(47,231,255,.13);
    }

    .node.active:after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(47,231,255,.13), transparent);
      transform: translateX(-100%);
      animation: sweep 1.7s infinite;
    }

    @keyframes sweep { to { transform: translateX(100%); } }

    .node-dot {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(255,255,255,.06);
      color: var(--muted);
      position: relative;
      z-index: 1;
    }

    .node.done .node-dot { color: var(--green); background: rgba(72,240,164,.12); }
    .node.active .node-dot { color: var(--cyan); background: rgba(47,231,255,.12); }
    .node.failed .node-dot { color: var(--red); background: rgba(255,111,145,.12); }

    .node strong { display: block; font-size: 13px; position: relative; z-index: 1; }
    .node small { display: block; color: var(--quiet); margin-top: 2px; position: relative; z-index: 1; }

    .feed {
      display: grid;
      gap: 9px;
    }

    .event {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.04);
      animation: flash-in .35s ease;
    }

    @keyframes flash-in {
      from { opacity: 0; transform: translateY(8px); border-color: rgba(47,231,255,.55); }
      to { opacity: 1; transform: none; }
    }

    .event-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .event-msg { color: var(--text); font-size: 13px; line-height: 1.45; }
    .event-data {
      margin-top: 7px;
      color: var(--quiet);
      font-size: 11px;
      overflow-wrap: anywhere;
    }

    .console-lines {
      padding: 8px 12px 14px;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      color: #b8c7df;
      font-size: 12px;
      line-height: 1.45;
    }

    .line {
      display: grid;
      grid-template-columns: 74px 118px minmax(0,1fr);
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,.035);
      padding: 2px 0;
    }

    .writer {
      min-height: 560px;
      display: grid;
      grid-template-rows: auto minmax(0,1fr);
    }

    .article {
      padding: 22px;
      overflow: auto;
      line-height: 1.75;
      color: #dce8fb;
    }

    .article h1, .article h2, .article h3 { color: #fff; line-height: 1.18; }
    .article h1 { font-size: 30px; }
    .article h2 { margin-top: 28px; font-size: 22px; }
    .article p { margin: 12px 0; }
    .article blockquote { border-left: 3px solid var(--cyan); padding-left: 12px; color: var(--muted); }
    .article code { background: rgba(255,255,255,.08); padding: 2px 5px; border-radius: 5px; }

    .editor {
      width: 100%;
      min-height: 520px;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 20px;
      outline: none;
      resize: vertical;
      line-height: 1.65;
    }

    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; min-width: 720px; }
    th, td { border-bottom: 1px solid rgba(255,255,255,.07); padding: 10px; text-align: left; vertical-align: top; font-size: 13px; }
    th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; background: rgba(255,255,255,.035); }

    .evidence-card, .contradiction-card, .source-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.035);
      padding: 13px;
    }

    .evidence-card summary {
      cursor: pointer;
      color: var(--text);
      font-weight: 800;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .chat {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      min-height: 650px;
    }

    .messages {
      padding: 14px;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .message {
      max-width: 82%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.055);
      line-height: 1.5;
      font-size: 14px;
    }

    .message.user {
      justify-self: end;
      background: rgba(90,167,255,.14);
      border-color: rgba(90,167,255,.28);
    }

    .chat-input {
      display: grid;
      grid-template-columns: minmax(0,1fr) auto;
      gap: 9px;
      padding: 12px;
      border-top: 1px solid var(--line);
    }

    .toast-stack {
      position: fixed;
      right: 18px;
      bottom: calc(var(--bottom) + 18px);
      display: grid;
      gap: 8px;
      z-index: 50;
      max-width: 360px;
    }

    .toast {
      display: grid;
      grid-template-columns: 8px minmax(0,1fr) auto;
      gap: 10px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(12, 17, 27, .96);
      padding: 11px;
      box-shadow: var(--shadow);
      animation: flash-in .2s ease;
    }

    .toast-bar { width: 8px; height: 100%; min-height: 28px; border-radius: 10px; background: var(--blue); }
    .toast.success .toast-bar { background: var(--green); }
    .toast.error .toast-bar { background: var(--red); }
    .toast.warn .toast-bar { background: var(--amber); }

    .empty {
      border: 1px dashed rgba(255,255,255,.18);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,.025);
    }

    .loading {
      position: relative;
      min-height: 80px;
    }

    .loading:before {
      content: "";
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,.16);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-right: 9px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spark {
      height: 54px;
      display: flex;
      align-items: end;
      gap: 4px;
    }

    .spark span {
      flex: 1;
      min-width: 5px;
      border-radius: 4px 4px 0 0;
      background: linear-gradient(to top, var(--blue), var(--cyan));
      opacity: .82;
    }

    .settings-row {
      display: grid;
      grid-template-columns: 210px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }

    @media (max-width: 1250px) {
      :root { --right: 310px; --left: 220px; }
      .grid.four { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .hero, .grid.workspace { grid-template-columns: 1fr; }
    }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .app { display: block; height: auto; min-height: 100vh; }
      .topbar { position: sticky; top: 0; height: var(--top); }
      .sidebar { position: sticky; top: var(--top); display: flex; gap: 6px; overflow-x: auto; border-right: 0; border-bottom: 1px solid var(--line); padding: 8px; }
      .nav-label, .side-status { display: none; }
      .nav-item { min-width: max-content; }
      .main { padding: 14px; }
      .right-panel, .console { margin: 14px; border: 1px solid var(--line); border-radius: 8px; max-height: 440px; }
      .form-grid, .grid.two, .grid.three, .split, .settings-row { grid-template-columns: 1fr; }
      .top-meta { display: none; }
    }

    @media (max-width: 640px) {
      .brand { min-width: auto; }
      .brand span:last-child { display: none; }
      .grid.four { grid-template-columns: 1fr; }
      .message { max-width: 100%; }
      .workspace-title { font-size: 34px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand"><span class="brand-mark">A</span><span>ARCOS</span></div>
      <div class="command"><input id="commandInput" placeholder="Command, search projects, or ask copilot"></div>
      <div class="top-meta">
        <span id="activeProjectName">No active project</span>
        <span class="live-pill"><span class="dot"></span><span id="streamState">stream idle</span></span>
        <button class="btn small" id="refreshBtn">Refresh</button>
      </div>
    </header>

    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
      <section class="view active" id="view-projects"></section>
      <section class="view" id="view-ai-studio"></section>
      <section class="view" id="view-live-workflow"></section>
      <section class="view" id="view-agent-activity"></section>
      <section class="view" id="view-verification-center"></section>
      <section class="view" id="view-contradictions"></section>
      <section class="view" id="view-evidence-explorer"></section>
      <section class="view" id="view-hyperlink-health"></section>
      <section class="view" id="view-telemetry"></section>
      <section class="view" id="view-ai-copilot"></section>
      <section class="view" id="view-generated-content"></section>
      <section class="view" id="view-settings"></section>
    </main>

    <aside class="right-panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">Live Activity</div>
          <div class="quiet mono" style="font-size:11px" id="rightPanelHint">events route to modules in real time</div>
        </div>
        <button class="btn icon small" id="clearFeedBtn" title="Clear feed">x</button>
      </div>
      <div class="panel-body">
        <div class="feed" id="activityFeed"></div>
      </div>
    </aside>

    <section class="console">
      <div class="panel-head" style="padding:8px 12px">
        <div class="panel-title">Streaming Console</div>
        <div class="quiet mono" id="consoleMeta">awaiting project</div>
      </div>
      <div class="console-lines" id="consoleLines"></div>
    </section>
  </div>

  <div class="toast-stack" id="toasts"></div>

  <script>
    const API_DEFAULT = location.origin && location.protocol.startsWith("http")
      ? location.origin.replace(/\/$/, "") + "/api/v1"
      : "https://verified-ai-research-writer.onrender.com/api/v1";

    const workflowStages = [
      ["planner", "Planner"],
      ["research_coordinator", "Research Coordinator"],
      ["source_validator", "Source Validator"],
      ["writer", "Writer"],
      ["critique_agent", "Critique Agent"],
      ["revision_agent", "Revision Agent"],
      ["hyperlink_validator", "Hyperlink Validator"],
      ["final_verification", "Final Verification"]
    ];

    const navItems = [
      ["projects", "Projects", "P"],
      ["ai-studio", "AI Studio", "S"],
      ["live-workflow", "Live Workflow", "W"],
      ["agent-activity", "Agent Activity", "A"],
      ["verification-center", "Verification Center", "V"],
      ["contradictions", "Contradictions", "C"],
      ["evidence-explorer", "Evidence Explorer", "E"],
      ["hyperlink-health", "Hyperlink Health", "H"],
      ["telemetry", "Telemetry", "T"],
      ["ai-copilot", "AI Copilot", "I"],
      ["generated-content", "Generated Content", "G"],
      ["settings", "Settings", "Z"]
    ];

    const state = {
      apiBase: localStorage.getItem("arcos.apiBase") || API_DEFAULT,
      currentView: "projects",
      projects: [],
      project: null,
      events: [],
      console: [],
      content: "",
      contentVersions: [],
      workflow: null,
      eventSource: null,
      reconnectTimer: null,
      pollTimer: null,
      telemetryTimer: null,
      generationMode: localStorage.getItem("arcos.mode") || "v2",
      contentMode: "preview",
      chat: []
    };

    const $ = (sel, root = document) => root.querySelector(sel);
    const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
    const viewId = key => "view-" + key;

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function normalizeId(item) {
      return item?.id || item?._id || item?.project_id || item?.uuid || "";
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function timeLabel(value) {
      const d = value ? new Date(value) : new Date();
      if (Number.isNaN(d.getTime())) return "--:--:--";
      return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    function compactNumber(value) {
      const n = Number(value || 0);
      return Intl.NumberFormat(undefined, { notation: n > 9999 ? "compact" : "standard" }).format(n);
    }

    function projectId() {
      return normalizeId(state.project);
    }

    async function api(path, options = {}) {
      const url = path.startsWith("http") ? path : state.apiBase + path;
      const headers = { Accept: "application/json", ...(options.headers || {}) };
      if (options.body && !(options.body instanceof FormData)) headers["Content-Type"] = "application/json";
      const res = await fetch(url, { ...options, headers });
      if (!res.ok) {
        let detail = "";
        try { detail = JSON.stringify(await res.json()); } catch { detail = await res.text(); }
        throw new Error(`${res.status} ${res.statusText}${detail ? ": " + detail.slice(0, 240) : ""}`);
      }
      if (res.status === 204) return null;
      const text = await res.text();
      if (!text) return null;
      try { return JSON.parse(text); } catch { return text; }
    }

    const endpoints = {
      projects: () => api("/projects"),
      createProject: data => api("/projects", { method: "POST", body: JSON.stringify(data) }),
      quickProject: data => api("/projects/quick", { method: "POST", body: JSON.stringify(data) }),
      generate: (id, mode) => api(`/projects/${id}/content/generate?mode=${encodeURIComponent(mode)}`, { method: "POST" }),
      workflow: id => api(`/projects/${id}/workflow`),
      eventsSnapshot: id => api(`/projects/${id}/chat/events`),
      verificationDashboard: id => api(`/projects/${id}/verification/dashboard`),
      verificationClaims: id => api(`/projects/${id}/verification/claims`),
      verificationSources: id => api(`/projects/${id}/verification/sources`),
      evidence: id => api(`/projects/${id}/evidence`),
      contradictions: id => api(`/projects/${id}/workflow/contradictions`),
      resolveContradiction: (id, cid, payload) => api(`/projects/${id}/workflow/contradictions/${cid}/resolve`, { method: "POST", body: JSON.stringify(payload) }),
      hyperlinks: id => api(`/projects/${id}/workflow/hyperlinks`),
      hyperlinksSummary: id => api(`/projects/${id}/workflow/hyperlinks/summary`),
      chat: (id, payload) => api(`/projects/${id}/chat`, { method: "POST", body: JSON.stringify(payload) }),
      telemetry: id => api(`/projects/${id}/workflow/telemetry`),
      content: id => api(`/projects/${id}/content`),
      latestContent: id => api(`/projects/${id}/content/latest`)
    };

    function toast(message, type = "info") {
      const node = document.createElement("div");
      node.className = `toast ${type}`;
      node.innerHTML = `<div class="toast-bar"></div><div>${escapeHtml(message)}</div><button class="btn icon small">x</button>`;
      $("#toasts").appendChild(node);
      $("button", node).onclick = () => node.remove();
      setTimeout(() => node.remove(), 5200);
    }

    function addConsole(event, message, agent = "") {
      const row = { t: timeLabel(), event, agent, message };
      state.console.unshift(row);
      state.console = state.console.slice(0, 220);
      renderConsole();
    }

    function renderConsole() {
      $("#consoleMeta").textContent = state.project ? `${state.console.length} buffered events` : "awaiting project";
      $("#consoleLines").innerHTML = state.console.map(line => `
        <div class="line">
          <span class="quiet">${escapeHtml(line.t)}</span>
          <span style="color:var(--cyan)">${escapeHtml(line.event)}</span>
          <span><span class="quiet">${escapeHtml(line.agent || "system")}</span> ${escapeHtml(line.message)}</span>
        </div>
      `).join("");
    }

    function addEvent(raw) {
      const ev = normalizeEvent(raw);
      const fingerprint = `${ev.timestamp}|${ev.node}|${ev.event_type}|${ev.message}`;
      if (state.events.some(item => item.fingerprint === fingerprint)) return;
      ev.fingerprint = fingerprint;
      state.events.unshift(ev);
      state.events = state.events.slice(0, 350);
      routeEvent(ev);
      renderActivity();
      renderWorkflow();
      renderContentWorkspace();
      addConsole(ev.event_type, ev.message, ev.agent || ev.node);
    }

    function normalizeEvent(raw) {
      const data = raw?.data && typeof raw.data === "object" ? raw.data : {};
      return {
        node: raw?.node || raw?.workflow_node || data.node || "system",
        event_type: raw?.event_type || raw?.type || raw?.event || "update",
        message: raw?.message || raw?.content || raw?.text || data.message || "Workflow update received.",
        data,
        timestamp: raw?.timestamp || raw?.created_at || nowIso(),
        agent: data.agent || raw?.agent || raw?.agent_name || raw?.node || "system",
        confidence: data.confidence ?? raw?.confidence,
        tokens: data.tokens_used ?? data.tokens ?? raw?.tokens_used
      };
    }

    function routeEvent(ev) {
      const type = ev.event_type.toLowerCase();
      const dataText = JSON.stringify(ev.data || {}).toLowerCase();
      if (type.includes("writing") || type.includes("draft") || type.includes("content") || ev.node === "writer") {
        const chunk = ev.data?.chunk || ev.data?.content || ev.data?.markdown || ev.message;
        if (chunk && !state.content.includes(chunk)) state.content += (state.content ? "\n\n" : "") + chunk;
      }
      if (type.includes("telemetry") || dataText.includes("tokens")) updateTelemetryCounters(ev);
    }

    function renderShell() {
      $("#sidebar").innerHTML = `
        <div class="nav-label">Workspace</div>
        ${navItems.map(([id, label, icon]) => `
          <button class="nav-item ${state.currentView === id ? "active" : ""}" data-view="${id}">
            <span class="nav-icon">${icon}</span><span>${label}</span>
          </button>
        `).join("")}
        <div class="side-status">
          <strong>Operations State</strong>
          <div>API: <span class="mono">${escapeHtml(state.apiBase.replace(/^https?:\/\//, ""))}</span></div>
          <div>Project: <span id="sideProject">${escapeHtml(state.project?.title || state.project?.topic || "none")}</span></div>
          <div>Events: <span id="sideEvents">${state.events.length}</span></div>
        </div>
      `;
      $$(".nav-item").forEach(btn => btn.onclick = () => navigate(btn.dataset.view));
      $("#activeProjectName").textContent = state.project?.title || state.project?.topic || "No active project";
      $("#streamState").textContent = state.eventSource ? "stream live" : state.project ? "polling ready" : "stream idle";
    }

    function navigate(view) {
      state.currentView = view;
      $$(".view").forEach(el => el.classList.toggle("active", el.id === viewId(view)));
      renderShell();
      renderCurrentView();
    }

    function requireProjectHtml() {
      return `
        <div class="empty">
          <h3>No active project selected</h3>
          <p>Create or select a project to activate streaming, workflow controls, evidence inspection, and copilot context.</p>
          <button class="btn primary" onclick="navigate('projects')">Open Projects</button>
        </div>
      `;
    }

    function renderCurrentView() {
      const renderers = {
        "projects": renderProjects,
        "ai-studio": renderAiStudio,
        "live-workflow": renderLiveWorkflowView,
        "agent-activity": renderAgentActivityView,
        "verification-center": renderVerification,
        "contradictions": renderContradictions,
        "evidence-explorer": renderEvidence,
        "hyperlink-health": renderHyperlinks,
        "telemetry": renderTelemetry,
        "ai-copilot": renderCopilot,
        "generated-content": renderGeneratedContent
      };
      if (renderers[state.currentView]) renderers[state.currentView]();
      else renderSettings();
    }

    async function loadProjects() {
      try {
        state.projects = await endpoints.projects() || [];
      } catch (err) {
        toast("Could not load projects: " + err.message, "error");
        state.projects = [];
      }
      renderProjects();
    }

    function projectPayload(form) {
      const fd = new FormData(form);
      const payload = Object.fromEntries(fd.entries());
      payload.seo_keywords = String(payload.seo_keywords || "").split(",").map(x => x.trim()).filter(Boolean);
      payload.research_depth = Number(payload.research_depth || 3);
      payload.ai_mode = state.generationMode;
      payload.workflow_type = payload.workflow_type || (state.generationMode === "v2" ? "multi_agent" : "linear");
      return payload;
    }

    function renderProjects() {
      const el = $("#view-projects");
      el.innerHTML = `
        <div class="hero">
          <div class="card pad">
            <h1 class="workspace-title"><span>AI research mission control</span> for verified content production.</h1>
            <p class="subtle" style="max-width:760px;margin:16px 0 0">Create research projects, launch agents, inspect claims, resolve contradictions, and watch content assemble live through a persistent operations stream.</p>
            <div style="display:flex;gap:9px;flex-wrap:wrap;margin-top:20px">
              <button class="btn primary" onclick="document.getElementById('topic').focus()">Create Project</button>
              <button class="btn" onclick="navigate('ai-studio')">Open AI Studio</button>
              <button class="btn" onclick="refreshAll()">Sync Workspace</button>
            </div>
          </div>
          <div class="grid two">
            ${metric("Projects", state.projects.length, "available workspaces", "blue")}
            ${metric("Events", state.events.length, "live buffer", "cyan")}
            ${metric("Mode", state.generationMode.toUpperCase(), "generation route", "violet")}
            ${metric("Words", countWords(state.content), "draft buffer", "green")}
          </div>
        </div>
        <div class="grid workspace">
          <form class="card pad" id="projectForm">
            <div class="section-head">
              <h2>Project Creation Workspace</h2>
              <span class="badge blue">POST /projects</span>
            </div>
            <div class="form-grid">
              ${field("Topic", "topic", "input", "AI regulation in enterprise search")}
              ${field("Title", "title", "input", "Verified AI research brief")}
              ${selectField("Tone", "tone", ["Professional", "Academic", "Conversational", "Persuasive", "Informative"])}
              ${selectField("Content Type", "content_type", ["Article", "Blog Post", "Research Paper", "Report", "White Paper", "Case Study"])}
              ${field("SEO Keywords", "seo_keywords", "input", "AI research, source verification, enterprise AI")}
              ${field("Target Audience", "target_audience", "input", "Product leaders, AI teams, researchers")}
              ${selectField("Research Depth", "research_depth", ["1", "2", "3", "4", "5"])}
              ${selectField("Workflow Type", "workflow_type", ["multi_agent", "linear"])}
            </div>
            <div class="field" style="margin-top:12px">
              <label>AI Mode Selector</label>
              <div class="segmented">
                <button type="button" class="${state.generationMode === "v1" ? "active" : ""}" data-mode="v1">Linear Workflow</button>
                <button type="button" class="${state.generationMode === "v2" ? "active" : ""}" data-mode="v2">Multi-Agent Workflow</button>
              </div>
            </div>
            <div style="display:flex;gap:9px;flex-wrap:wrap;margin-top:15px">
              <button class="btn primary" type="submit">Create Full Project</button>
              <button class="btn green" type="button" id="quickCreateBtn">Quick Create</button>
            </div>
          </form>
          <div class="card pad">
            <div class="section-head">
              <h2>Project Registry</h2>
              <button class="btn small" onclick="loadProjects()">Reload</button>
            </div>
            <div class="project-list">
              ${state.projects.length ? state.projects.map(projectCard).join("") : `<div class="empty">No projects returned by the API yet.</div>`}
            </div>
          </div>
        </div>
      `;
      $("#projectForm").onsubmit = async e => {
        e.preventDefault();
        await createProject(projectPayload(e.currentTarget), false);
      };
      $("#quickCreateBtn").onclick = async () => createProject(projectPayload($("#projectForm")), true);
      $$("[data-mode]").forEach(btn => btn.onclick = () => {
        state.generationMode = btn.dataset.mode;
        localStorage.setItem("arcos.mode", state.generationMode);
        renderProjects();
      });
      $$("[data-project]").forEach(btn => btn.onclick = () => activateProject(state.projects.find(p => normalizeId(p) === btn.dataset.project)));
    }

    function metric(label, value, note, tone) {
      return `<div class="card metric"><div class="metric-label">${escapeHtml(label)}</div><div class="metric-value" style="color:var(--${tone})">${escapeHtml(value)}</div><div class="metric-note">${escapeHtml(note)}</div></div>`;
    }

    function field(label, name, type, placeholder) {
      const tag = type === "textarea" ? "textarea" : "input";
      return `<div class="field"><label for="${name}">${label}</label><${tag} class="${type === "textarea" ? "textarea" : "input"}" id="${name}" name="${name}" placeholder="${escapeHtml(placeholder)}"></${tag}></div>`;
    }

    function selectField(label, name, options) {
      return `<div class="field"><label for="${name}">${label}</label><select class="select" id="${name}" name="${name}">${options.map(o => `<option value="${escapeHtml(String(o).toLowerCase().replaceAll(" ", "_"))}">${escapeHtml(o)}</option>`).join("")}</select></div>`;
    }

    function projectCard(p) {
      const id = normalizeId(p);
      const active = id && id === projectId();
      return `
        <article class="project-card">
          <div style="display:flex;justify-content:space-between;gap:8px;align-items:start">
            <strong>${escapeHtml(p.title || p.topic || "Untitled project")}</strong>
            ${active ? `<span class="badge green">active</span>` : `<span class="badge">idle</span>`}
          </div>
          <p class="subtle" style="font-size:13px">${escapeHtml(p.topic || p.description || "Research workspace")}</p>
          <div style="display:flex;gap:7px;flex-wrap:wrap;margin:10px 0">
            <span class="badge blue">${escapeHtml(p.content_type || "content")}</span>
            <span class="badge violet">${escapeHtml(p.tone || "tone")}</span>
          </div>
          <button class="btn small primary" data-project="${escapeHtml(id)}">Open Workspace</button>
        </article>
      `;
    }

    async function createProject(payload, quick) {
      try {
        toast(quick ? "Quick project request sent." : "Project creation request sent.", "info");
        const created = quick ? await endpoints.quickProject(payload) : await endpoints.createProject(payload);
        if (created) {
          state.projects.unshift(created);
          activateProject(created);
          toast("Project created and live monitoring initialized.", "success");
          navigate("ai-studio");
        }
      } catch (err) {
        toast("Project creation failed: " + err.message, "error");
      }
    }

    function activateProject(project) {
      if (!project) return;
      state.project = project;
      localStorage.setItem("arcos.projectId", projectId());
      state.content = "";
      state.workflow = null;
      state.events = [];
      closeStream();
      openStream();
      refreshAll();
      renderShell();
      toast("Workspace loaded: " + (project.title || project.topic || projectId()), "success");
    }

    function renderAiStudio() {
      const el = $("#view-ai-studio");
      if (!state.project) { el.innerHTML = requireProjectHtml(); return; }
      el.innerHTML = `
        <div class="section-head">
          <div>
            <h2>Content Generation Workspace</h2>
            <div class="subtle">Async generation starts instantly, then SSE and polling update the workspace as agents progress.</div>
          </div>
          <span class="badge blue">${escapeHtml(projectId())}</span>
        </div>
        <div class="grid workspace">
          <div class="card writer">
            <div class="panel-head">
              <div>
                <div class="panel-title">Incremental Draft</div>
                <div class="quiet mono">${countWords(state.content)} words buffered</div>
              </div>
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                <button class="btn small" onclick="state.contentMode='preview';renderAiStudio()">Preview</button>
                <button class="btn small" onclick="state.contentMode='edit';renderAiStudio()">Edit</button>
                <button class="btn small green" onclick="startGeneration('v1')">Start v1</button>
                <button class="btn small primary" onclick="startGeneration('v2')">Start v2</button>
              </div>
            </div>
            ${state.contentMode === "edit"
              ? `<textarea class="editor" id="contentEditor">${escapeHtml(state.content)}</textarea>`
              : `<article class="article">${renderMarkdown(state.content || "## Waiting for generation\n\nStart a linear or multi-agent run to watch sections appear here as the writer and revision agents stream updates.")}</article>`}
          </div>
          <div class="grid">
            <div class="card pad">
              <h3 style="margin-top:0">Orchestration Controls</h3>
              <div class="segmented">
                <button class="${state.generationMode === "v1" ? "active" : ""}" onclick="setMode('v1')">Linear</button>
                <button class="${state.generationMode === "v2" ? "active" : ""}" onclick="setMode('v2')">Multi-Agent</button>
              </div>
              <div style="display:grid;gap:8px;margin-top:12px">
                <button class="btn primary" onclick="startGeneration(state.generationMode)">Start Generation</button>
                <button class="btn" onclick="refreshAll()">Refresh Operational State</button>
                <button class="btn" onclick="navigate('verification-center')">Inspect Verification</button>
              </div>
            </div>
            <div class="card pad">
              <div class="section-head"><h3>Active Workflow</h3><span class="badge green">${activeStageName()}</span></div>
              <div class="workflow">${renderWorkflowNodes()}</div>
            </div>
          </div>
        </div>
      `;
      const editor = $("#contentEditor");
      if (editor) editor.oninput = () => { state.content = editor.value; };
    }

    function setMode(mode) {
      state.generationMode = mode;
      localStorage.setItem("arcos.mode", mode);
      renderCurrentView();
    }

    async function startGeneration(mode) {
      if (!state.project) return toast("Select a project before generation.", "warn");
      setMode(mode);
      addEvent({ node: "planner", event_type: "generation_started", message: `Generation requested with mode ${mode}.`, timestamp: nowIso(), data: { agent: "orchestrator" } });
      navigate("live-workflow");
      openStream();
      try {
        await endpoints.generate(projectId(), mode);
        toast("Generation accepted. Streaming orchestration is active.", "success");
      } catch (err) {
        toast("Generation request failed: " + err.message, "error");
        addEvent({ node: "orchestrator", event_type: "generation_error", message: err.message, timestamp: nowIso(), data: { agent: "frontend", severity: "error" } });
      }
    }

    function renderLiveWorkflowView() {
      const el = $("#view-live-workflow");
      if (!state.project) { el.innerHTML = requireProjectHtml(); return; }
      el.innerHTML = `
        <div class="section-head">
          <div><h2>Live Workflow Visualization</h2><div class="subtle">Current node, completed stages, queued work, failures, and run timing.</div></div>
          <button class="btn" onclick="loadWorkflow()">Sync Workflow</button>
        </div>
        <div class="grid workspace">
          <div class="card pad"><div class="workflow">${renderWorkflowNodes()}</div></div>
          <div class="grid">
            ${metric("Current Node", activeStageName(), "glowing active stage", "cyan")}
            ${metric("Completed", completedCount(), "stages marked done", "green")}
            ${metric("Queued", queuedCount(), "stages remaining", "amber")}
            ${metric("Failed", failedCount(), "attention needed", "red")}
          </div>
        </div>
      `;
    }

    async function loadWorkflow() {
      if (!state.project) return;
      try {
        state.workflow = await endpoints.workflow(projectId());
        renderWorkflow();
      } catch (err) {
        toast("Workflow refresh failed: " + err.message, "error");
      }
    }

    function renderWorkflow() {
      if (state.currentView === "live-workflow") renderLiveWorkflowView();
      if (state.currentView === "ai-studio") renderAiStudio();
    }

    function workflowStatusMap() {
      const map = {};
      const wf = state.workflow || {};
      const nodes = wf.nodes || wf.stages || wf.workflow || wf.execution_trace || [];
      if (Array.isArray(nodes)) {
        nodes.forEach(n => map[n.node || n.id || n.name] = String(n.status || n.state || "").toLowerCase());
      }
      const current = wf.current_node || wf.active_node || latestNode();
      workflowStages.forEach(([key], idx) => {
        if (!map[key]) {
          const currentIdx = workflowStages.findIndex(([k]) => k === current);
          map[key] = idx < currentIdx ? "completed" : idx === currentIdx ? "active" : "queued";
        }
      });
      return map;
    }

    function latestNode() {
      return state.events[0]?.node || "planner";
    }

    function activeStageName() {
      const current = (state.workflow?.current_node || state.workflow?.active_node || latestNode() || "").toLowerCase();
      return workflowStages.find(([k]) => k === current)?.[1] || titleize(current || "idle");
    }

    function renderWorkflowNodes() {
      const statuses = workflowStatusMap();
      return workflowStages.map(([key, label], index) => {
        const status = statuses[key] || "queued";
        const cls = status.includes("complete") || status === "done" || status === "success" ? "done" : status.includes("fail") || status === "error" ? "failed" : status.includes("active") || status.includes("running") || key === latestNode() ? "active" : "";
        const duration = durationForNode(key);
        return `
          <div class="node ${cls}">
            <div class="node-dot">${cls === "done" ? "OK" : cls === "failed" ? "!" : index + 1}</div>
            <div><strong>${label}</strong><small>${escapeHtml(status || "queued")} ${duration ? "- " + duration : ""}</small></div>
            <span class="badge ${cls === "done" ? "green" : cls === "failed" ? "red" : cls === "active" ? "blue" : ""}">${cls || "queued"}</span>
          </div>
        `;
      }).join("");
    }

    function durationForNode(key) {
      const nodes = state.workflow?.nodes || state.workflow?.stages || [];
      const n = Array.isArray(nodes) ? nodes.find(x => (x.node || x.id || x.name) === key) : null;
      const ms = n?.duration_ms || n?.duration || 0;
      return ms ? `${Math.round(ms / 1000)}s` : "";
    }

    function completedCount() { return Object.values(workflowStatusMap()).filter(s => s.includes("complete") || s === "done" || s === "success").length; }
    function failedCount() { return Object.values(workflowStatusMap()).filter(s => s.includes("fail") || s === "error").length; }
    function queuedCount() { return Math.max(0, workflowStages.length - completedCount() - failedCount() - 1); }

      const t = `${ev.event_type} ${ev.message}`.toLowerCase();
      if (t.includes("error") || t.includes("fail") || t.includes("broken")) return "red";
      if (t.includes("contradiction") || t.includes("warning")) return "amber";
      if (t.includes("verified") || t.includes("valid") || t.includes("complete")) return "green";
      if (t.includes("write") || t.includes("revision")) return "violet";
      return "blue";
    }

    function openStream() {
      if (!state.project) return;
      closeStream();
      const id = projectId();
      const url = `${state.apiBase}/projects/${encodeURIComponent(id)}/chat/events`;
      addConsole("stream_connect", url, "frontend");
      try {
        const es = new EventSource(url);
        state.eventSource = es;
        es.onopen = () => {
          $("#streamState").textContent = "stream live";
          addConsole("stream_open", "SSE connection established.", "frontend");
        };
        es.onmessage = event => {
          parseIncomingEvent(event.data);
        };
        ["discovery", "verification", "contradiction", "writing", "telemetry", "workflow"].forEach(type => {
          es.addEventListener(type, event => parseIncomingEvent(event.data, type));
        });
        es.onerror = () => {
          $("#streamState").textContent = "reconnecting";
          addConsole("stream_error", "SSE connection interrupted; fallback polling active.", "frontend");
          startPolling();
        };
      } catch (err) {
        addConsole("stream_error", err.message, "frontend");
        startPolling();
      }
      startPolling();
      startTelemetryLoop();
      renderShell();
    }

    function parseIncomingEvent(payload, forcedType) {
      try {
        const parsed = JSON.parse(payload);
        if (Array.isArray(parsed)) parsed.forEach(addEvent);
        else addEvent(forcedType ? { ...parsed, event_type: parsed.event_type || forcedType } : parsed);
      } catch {
        addEvent({ node: "stream", event_type: forcedType || "message", message: payload, timestamp: nowIso(), data: { agent: "eventsource" } });
      }
    }

    function closeStream() {
      if (state.eventSource) state.eventSource.close();
      state.eventSource = null;
      clearTimeout(state.reconnectTimer);
      clearInterval(state.pollTimer);
      clearInterval(state.telemetryTimer);
    }

    function startPolling() {
      clearInterval(state.pollTimer);
      if (!state.project) return;
      pollEvents();
      state.pollTimer = setInterval(pollEvents, 5000);
    }

    async function pollEvents() {
      if (!state.project) return;
      try {
        const data = await endpoints.eventsSnapshot(projectId());
        const events = arrayFrom(data, ["events", "items", "results"]);
        events.forEach(addEvent);
        $("#streamState").textContent = state.eventSource ? "stream live" : "polling";
      } catch (err) {
        $("#streamState").textContent = "stream degraded";
      }
    }

    function startTelemetryLoop() {
      clearInterval(state.telemetryTimer);
      if (!state.project) return;
      state.telemetryTimer = setInterval(() => {
        if (["telemetry", "live-workflow"].includes(state.currentView)) refreshAll(false);
      }, 9000);
    }

    async function refreshAll(show = true) {
      if (show) toast("Refreshing live workspace.", "info");
      if (!state.project) {
        await loadProjects();
        return;
      }
      await Promise.allSettled([loadWorkflow(), pollEvents(), preloadLatestContent()]);
      renderCurrentView();
    }

    async function preloadLatestContent() {
      try {
        const latest = await endpoints.latestContent(projectId());
        const text = latest?.markdown || latest?.content || latest?.article || latest?.body || "";
        if (text && text.length >= state.content.length) state.content = text;
      } catch {}
    }

    function arrayFrom(value, keys = []) {
      if (Array.isArray(value)) return value;
      if (!value || typeof value !== "object") return [];
      for (const key of keys) if (Array.isArray(value[key])) return value[key];
      if (Array.isArray(value.data)) return value.data;
      return [];
    }

    function renderMarkdown(md) {
      let html = escapeHtml(md || "");
      html = html
        .replace(/^### (.*)$/gm, "<h3>$1</h3>")
        .replace(/^## (.*)$/gm, "<h2>$1</h2>")
        .replace(/^# (.*)$/gm, "<h1>$1</h1>")
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.*?)\*/g, "<em>$1</em>")
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        .replace(/\n{2,}/g, "</p><p>")
        .replace(/\n/g, "<br>");
      return `<p>${html}</p>`.replace(/<p><h/g, "<h").replace(/<\/h([1-3])><\/p>/g, "</h$1>");
    }

    function sourceCard(s) {
      const url = s.url || s.source_url || s.link || "";
      return `<div class="source-card"><strong>${escapeHtml(s.title || s.domain || url || "Source")}</strong><p class="subtle" style="font-size:12px">${escapeHtml(s.summary || s.snippet || s.description || "Reliability metadata")}</p><div style="display:flex;gap:7px;flex-wrap:wrap"><span class="badge green">${percent(s.reliability ?? s.trust_score ?? s.score)}</span>${url ? `<a class="badge blue" href="${escapeHtml(url)}" target="_blank" rel="noopener">open</a>` : ""}</div></div>`;
    }

    function statusTone(status) {
      const s = String(status || "").toLowerCase();
      if (s.includes("valid") || s.includes("success") || s.includes("complete") || s.includes("verified")) return "green";
      if (s.includes("fail") || s.includes("invalid") || s.includes("broken") || s.includes("reject")) return "red";
      if (s.includes("pending") || s.includes("review") || s.includes("warn")) return "amber";
      return "blue";
    }

    function percent(value) {
      if (value === undefined || value === null || value === "") return "-";
      const n = Number(value);
      if (Number.isNaN(n)) return escapeHtml(value);
      return Math.round((n <= 1 ? n * 100 : n)) + "%";
    }

    function msLabel(value) {
      const n = Number(value || 0);
      if (!n) return "-";
      return n > 1000 ? (n / 1000).toFixed(2) + "s" : Math.round(n) + "ms";
    }

    function sparkBars(values) {
      const nums = values.length ? values.map(v => Math.max(1, Number(v || 1))) : [3, 9, 5, 12, 8, 14, 7, 11];
      const max = Math.max(...nums, 1);
      return nums.slice(0, 24).map(v => `<span style="height:${Math.max(8, Math.round((v / max) * 54))}px"></span>`).join("");
    }

    function titleize(text) {
      return String(text || "").replace(/[_-]/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    }

    function countWords(text) {
      return String(text || "").trim().split(/\s+/).filter(Boolean).length;
    }

    async function copyContent() {
      await navigator.clipboard.writeText(state.content || "");
      toast("Content copied to clipboard.", "success");
    }

    function downloadContent() {
      const blob = new Blob([state.content || ""], { type: "text/markdown" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `arcos-${projectId() || "content"}.md`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    $("#refreshBtn").onclick = () => refreshAll();
    $("#clearFeedBtn").onclick = () => { state.events = []; renderActivity(); renderConsole(); };
    $("#commandInput").addEventListener("keydown", e => {
      if (e.key !== "Enter") return;
      const q = e.currentTarget.value.trim().toLowerCase();
      e.currentTarget.value = "";
      const nav = navItems.find(([, label]) => label.toLowerCase().includes(q));
      if (nav) navigate(nav[0]);
      else if (q.startsWith("generate")) startGeneration(q.includes("v1") ? "v1" : "v2");
      else if (q) {
        navigate("ai-copilot");
        setTimeout(() => {
          const input = $("#chatText");
          if (input) input.value = q;
        }, 60);
      }
    });

    window.navigate = navigate;
    window.refreshAll = refreshAll;
    window.loadProjects = loadProjects;
    window.renderVerification = renderVerification;
    window.renderEvidence = renderEvidence;
    window.renderContradictions = renderContradictions;
    window.renderHyperlinks = renderHyperlinks;
    window.renderTelemetry = renderTelemetry;
    window.pollEvents = pollEvents;
    window.startGeneration = startGeneration;
    window.setMode = setMode;
    window.resolveContradiction = resolveContradiction;
    window.saveSettings = saveSettings;
    window.copyContent = copyContent;
    window.downloadContent = downloadContent;
    window.selectVersion = selectVersion;
    window.renderContentWorkspace = renderContentWorkspace;
    window.renderAiStudio = renderAiStudio;

    document.addEventListener("DOMContentLoaded", async () => {
      renderShell();
      renderProjects();
      renderActivity();
      renderConsole();
      await loadProjects();
      const saved = localStorage.getItem("arcos.projectId");
      if (saved) {
        const found = state.projects.find(p => normalizeId(p) === saved);
        if (found) activateProject(found);
      }
      addConsole("boot", "ARCOS frontend initialized.", "frontend");
    });
  </script>
</body>
</html>
